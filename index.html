<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ms. BananaS - Juego</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('Room.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    #banana {
      position: absolute;
      left: 50%;
      top: 20%;
      transform: translateX(-50%);
      width: 180px;
      opacity: 0;
      animation: float 3s ease-in-out infinite, appear 2s ease forwards;
      animation-delay: 2s;
    }

    @keyframes float {
      0% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
      100% { transform: translateX(-50%) translateY(0); }
    }

    @keyframes appear {
      to { opacity: 1; }
    }

    #tv {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      height: 270px;
      background-color: black;
      border: 4px solid #333;
      box-shadow: 0 0 20px #000;
    }

    #animal {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .options {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    .options button {
      font-size: 1.2em;
      padding: 10px 20px;
      background-color: #222;
      color: #FFD700;
      border: 2px solid #FFD700;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .options button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
  <audio src="Room Theme.mp3" autoplay loop></audio>

  <img id="banana" src="banana.png" alt="Ms. BananaS">

  <div id="tv">
    <img id="animal" src="cat.png" alt="Animal">
  </div>

  <div class="options">
    <button>Gato</button>
    <button>Perro</button>
    <button>Conejo</button>
  </div>
</body>
</html>
