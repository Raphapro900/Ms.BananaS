<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ms. BananaS - Menu</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      color: #FFD700;
      font-family: 'Courier New', monospace;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin-top: 40px;
      text-shadow: 2px 2px 8px red;
      letter-spacing: 2px;
    }

    #banana {
      width: 220px;
      cursor: pointer;
      margin-top: 60px;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    #banana:hover {
      transform: scale(1.15) rotate(-5deg);
      filter: drop-shadow(0 0 15px yellow);
    }

    .menu-text {
      margin-top: 20px;
      font-size: 1.5em;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Ms. BananaS</h1>
  <p class="menu-text">Click the banana to start</p>
  <img id="banana" src="banana.png" alt="Ms. BananaS">

  <audio id="menuMusic" src="bananamenu.mp3" autoplay loop></audio>

  <script>
    const banana = document.getElementById("banana");
    const menuMusic = document.getElementById("menuMusic");

    banana.addEventListener("click", () => {
      menuMusic.pause();

      // Simulate current day (replace with save system later)
      let currentDay = 1; // Change to 2, 3, 4, or 5

      const dialogue = new Audio(currentDay === 1 ? "Primer dia.mp3" : "dias.mp3");
      dialogue.play();

      // Redirect or load game logic
      alert("Game is loading...");
    });
  </script>

  <footer>© 2026 Ms. BananaS Project</footer>
</body>
</html>
