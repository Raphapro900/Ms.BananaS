<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ms. BananaS V1.0</title>
  <style>
    body {margin:0;padding:0;font-family:'IndieFlower',cursive;background:black;color:#FFD700;text-align:center;overflow:hidden;}
    #startScreen {
      height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(-45deg,#ffcc00,#ff6600,#ffaa00,#ff3300);
      background-size:400% 400%;animation:gradientBG 8s ease infinite;
    }
    @keyframes gradientBG {
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }
    .menuBtn {
      font-size:1.5em;padding:15px 30px;margin:10px;
      background:#222;color:#FFD700;border:2px solid #FFD700;cursor:pointer;
      transition:transform .2s ease;
    }
    .menuBtn:hover {transform:scale(1.1);}
    #bananaPlay {
      width:240px;cursor:pointer;transition:transform .3s ease,filter .3s ease;
      animation:float 3s ease-in-out infinite;margin:20px;
    }
    #bananaPlay:hover {transform:scale(1.1) rotate(-5deg);filter:drop-shadow(0 0 15px yellow);}
    @keyframes float {0%{transform:translateY(0);}50%{transform:translateY(-15px);}100%{transform:translateY(0);}}
    footer {position:absolute;bottom:10px;width:100%;text-align:center;font-size:.9em;color:#222;}
    #infoBox {
      display:none;position:absolute;top:20%;left:50%;transform:translateX(-50%);
      width:70%;padding:20px;background:rgba(0,0,0,.8);color:#FFD700;border:2px solid #FFD700;
    }
    #closeBtn {position:absolute;top:5px;right:10px;cursor:pointer;color:#FFD700;font-size:1.2em;}
    #intro {
      display:none;position:fixed;top:0;left:0;width:100%;height:100%;
      background:black;color:#FFD700;z-index:9999;
      display:flex;align-items:center;justify-content:center;
      font-size:3em;animation:introAnim 3s ease forwards;
    }
    @keyframes introAnim {
      0%{opacity:0;transform:scale(0.5);}
      50%{opacity:1;transform:scale(1.2);}
      100%{opacity:0;transform:scale(1);}
    }
    #gameScreen {display:none;width:100%;height:100vh;background:url('Room.png') center/cover no-repeat;position:relative;}
    #bananaGame {position:absolute;left:10%;top:50%;transform:translateY(-50%);width:300px;animation:float 3s ease-in-out infinite;}
    #tv {position:absolute;left:55%;top:50%;transform:translate(-50%,-50%);width:480px;height:270px;background:black;border:4px solid #333;box-shadow:0 0 20px #000;}
    #animal {width:100%;height:100%;object-fit:contain;}
    .options {position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:20px;}
    .options button {font-size:1.2em;padding:10px 20px;background:#222;color:#FFD700;border:2px solid #FFD700;cursor:pointer;}
    #dialogueBox {position:absolute;top:20px;left:50%;transform:translateX(-50%);width:70%;padding:15px;background:rgba(0,0,0,.7);color:#FFD700;font-size:1.2em;border:2px solid #FFD700;display:none;}
    #rageText {position:absolute;top:80px;left:50%;transform:translateX(-50%);font-size:1.5em;color:red;}
    #dayText {position:absolute;top:120px;left:50%;transform:translateX(-50%);font-size:1.3em;color:#FFD700;}
    #jumpscare {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:9999;}
    #jumpscare video {width:100%;height:100%;object-fit:cover;}
  </style>
</head>
<body>
  <div id="startScreen">
    <h1>Ms. BananaS</h1>
    <img id="bananaPlay" src="banana.png" alt="Ms.BananaS">
    <button class="menuBtn" id="howBtn">How to Play</button>
    <button class="menuBtn" id="shopBtn">Shop</button>
    <button class="menuBtn" id="exitBtn">Exit</button>
    <audio id="menuMusic" src="bananamenu.mp3" autoplay loop></audio>
    <footer>©Raphapro900 2026 — Versión V1.0</footer>
    <div id="infoBox"><span id="closeBtn">✖</span><div id="infoContent"></div></div>
  </div>

  <div id="intro">Raphapro900</div>

  <div id="gameScreen">
    <audio id="roomMusic" src="Room Theme.mp3" loop></audio>
    <img id="bananaGame" src="banana.png" alt="Ms. BananaS">
    <div id="tv"><img id="animal" src="Seal.webp" alt="Animal"></div>
    <div class="options">
      <button>Seal</button><button>Dog</button><button>Cat</button>
      <button>Duck</button><button>Eagle</button><button>Snake</button>
    </div>
    <div id="dialogueBox"></div>
    <audio id="dialogueAudio"></audio>
    <div id="rageText">Furia: 0</div>
    <div id="dayText">Día 1 — Animales: 0/15</div>
  </div>

  <div id="jumpscare">
    <video id="jumpscareVideo" src="jumpscare.mp4"></video>
  </div>

  <script>
    const bananaPlay=document.getElementById("bananaPlay"),
          howBtn=document.getElementById("howBtn"),
          shopBtn=document.getElementById("shopBtn"),
          exitBtn=document.getElementById("exitBtn"),
          infoBox=document.getElementById("infoBox"),
          infoContent=document.getElementById("infoContent"),
          closeBtn=document.getElementById("closeBtn"),
          intro=document.getElementById("intro"),
          startScreen=document.getElementById("startScreen"),
          gameScreen=document.getElementById("gameScreen"),
          menuMusic=document.getElementById("menuMusic"),
          roomMusic=document.getElementById("roomMusic"),
          animalImg=document.getElementById("animal"),
          dialogueBox=document.getElementById("dialogueBox"),
          dialogueAudio=document.getElementById("dialogueAudio"),
          rageText=document.getElementById("rageText"),
          dayText=document.getElementById("dayText"),
          jumpscare=document.getElementById("jumpscare"),
          jumpscareVideo=document.getElementById("jumpscareVideo"),
          buttons=document.querySelectorAll(".options button");

    const animals=[{name:"Seal",file:"Seal.webp"},{name:"Dog",file:"Dog.jfif"},{name:"Cat",file:"Cat.jpj"},{name:"Duck",file:"Duck.avif"},{name:"Eagle",file:"Aguila.webp"},{name:"Snake",file:"Snake.jfif"}];
    let currentAnimal=animals[0],rage=0,day=1,correctCount=0;
    const dayTargets={1:15,2:22,3:31,4:39,5:46};

    bananaPlay.addEventListener("click",()=>{
      intro.style.display="flex";
      setTimeout(()=>{
        intro.remove(); // elimina el logo del DOM
        startScreen.style.display="none";
        gameScreen.style.display="block";
        menuMusic.pause();roomMusic.play();
        showDialogue("¡Bienvenido al primer día!","Primer dia.mp3");
        nextAnimal();
      },3000);
    });

    howBtn.addEventListener("click",()=>{
      infoBox.style.display="block";
      infoContent.innerHTML="<h2>How to Play</h2><p>Selecciona el animal correcto en cada día. Si fallas, aumenta tu furia. Al llegar a 10 de furia ocurre un evento especial.</p>";
    });

    shopBtn.addEventListener("click",()=>{
      infoBox.style.display="block";
      infoContent.innerHTML="<h2>Shop</h2><p><span style='color:gold'>At this time we have nothing in the Store</span>. <span style='color:gold'>In a future update</span> there will be items here.</p>";
    });

    exitBtn.addEventListener("click",()=>{
      window.close();
    });

    closeBtn.addEventListener("click",()=>{
      infoBox.style.display="none";
    });

    function showDialogue(text,audioFile){
      dialogueBox.innerText=text;dialogueBox.style.display="block";
      dialogueAudio.src=audioFile;dialogueAudio.play();
      dialogueAudio.onended=()=>{dialogueBox.style.display="none";};
    }

    function nextAnimal(){
      currentAnimal=animals[Math.floor(Math.random()*animals.length)];
      animalImg.src=currentAnimal.file;
      animalImg.alt=currentAnimal.name;
      buttons.forEach(btn=>btn.style.backgroundColor="#222");
    }

    function triggerJumpscare(){
      jumpscare.style.display="block";
      jumpscareVideo.play();
      jumpscareVideo.onended=()=>{
        window.location.href="https://raw.githubusercontent.com/Raphapro900/Ms.BananaS/refs/heads/main/You%20know%20nothing%2C%20IDIOT.png";
      };
    }

    buttons.forEach(btn=>{
      btn.addEventListener("click",()=>{
        if(btn.innerText===currentAnimal.name){
          btn.style.backgroundColor="green";correctCount++;
          dayText.innerText="Día "+day+" — Animales: "+correctCount+"/"+dayTargets[day];
          showDialogue("¡Correcto!","c1.mp3");
          if(correctCount>=dayTargets[day]){
            showDialogue("¡Has completado el día "+day+"!","c2.mp3");
            setTimeout(()=>{
              gameScreen.style.display="none";
              startScreen.style.display="flex";
              menuMusic.play();
            },4000);
          }
          setTimeout(nextAnimal,2000);
        }else{
          btn.style.backgroundColor="red";
          buttons.forEach(b=>{if(b.innerText===currentAnimal.name)b.style.backgroundColor="yellow";});
          rage++;rageText.innerText="Furia: "+rage;
          showDialogue("¡Fallaste!","f1.mp3");
          if(rage>=10){triggerJumpscare();}
          else{setTimeout(nextAnimal,2000);}
        }
      });
    });
  </script>
</body>
</html>
