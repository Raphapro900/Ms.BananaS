<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ms. BananaS V1.0</title>
  <style>
    body {margin:0;padding:0;font-family:'IndieFlower',cursive;background:black;color:#FFD700;text-align:center;overflow:hidden;}
    #startScreen {
      height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(-45deg,#ffcc00,#ff6600,#ffaa00,#ff3300);
      background-size:400% 400%;animation:gradientBG 8s ease infinite;
    }
    @keyframes gradientBG {
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }
    .menuBtn {
      font-size:1.5em;padding:15px 30px;margin:10px;
      background:#222;color:#FFD700;border:2px solid #FFD700;cursor:pointer;
      transition:transform .2s ease;
    }
    .menuBtn:hover {transform:scale(1.1);}
    footer {position:absolute;bottom:10px;width:100%;text-align:center;font-size:.9em;color:#222;}
    #infoBox {
      display:none;position:absolute;top:20%;left:50%;transform:translateX(-50%);
      width:70%;padding:20px;background:rgba(0,0,0,.8);color:#FFD700;border:2px solid #FFD700;
    }
    #closeBtn {
      position:absolute;top:5px;right:10px;cursor:pointer;color:#FFD700;font-size:1.2em;
    }
    /* Intro animada */
    #intro {
      display:none;position:fixed;top:0;left:0;width:100%;height:100%;
      background:black;color:#FFD700;z-index:9999;
      display:flex;align-items:center;justify-content:center;
      font-size:3em;animation:introAnim 3s ease forwards;
    }
    @keyframes introAnim {
      0%{opacity:0;transform:scale(0.5);}
      50%{opacity:1;transform:scale(1.2);}
      100%{opacity:0;transform:scale(1);}
    }
  </style>
</head>
<body>
  <div id="startScreen">
    <h1>Ms. BananaS</h1>
    <button class="menuBtn" id="playBtn">Ms.BananaS</button>
    <button class="menuBtn" id="howBtn">How to Play</button>
    <button class="menuBtn" id="shopBtn">Shop</button>
    <button class="menuBtn" id="exitBtn">Exit</button>
    <audio id="menuMusic" src="bananamenu.mp3" autoplay loop></audio>
    <footer>©Raphapro900 2026 — Versión V1.0</footer>
    <div id="infoBox"><span id="closeBtn">✖</span><div id="infoContent"></div></div>
  </div>

  <div id="intro">Raphapro900</div>

  <script>
    const playBtn=document.getElementById("playBtn"),
          howBtn=document.getElementById("howBtn"),
          shopBtn=document.getElementById("shopBtn"),
          exitBtn=document.getElementById("exitBtn"),
          infoBox=document.getElementById("infoBox"),
          infoContent=document.getElementById("infoContent"),
          closeBtn=document.getElementById("closeBtn"),
          intro=document.getElementById("intro");

    playBtn.addEventListener("click",()=>{
      intro.style.display="flex";
      setTimeout(()=>{
        intro.style.display="none";
        alert("Aquí comienza el juego Ms.BananaS...");
        // Aquí puedes enganchar tu lógica de juego
      },3000);
    });

    howBtn.addEventListener("click",()=>{
      infoBox.style.display="block";
      infoContent.innerHTML="<h2>How to Play</h2><p>Selecciona el animal correcto en cada día. Si fallas, aumenta tu furia. Al llegar a 10 de furia ocurre un evento especial.</p>";
    });

    shopBtn.addEventListener("click",()=>{
      infoBox.style.display="block";
      infoContent.innerHTML="<h2>Shop</h2><p><span style='color:gold'>At this time we have nothing in the Store</span>. <span style='color:gold'>In a future update</span> there will be items here.</p>";
    });

    exitBtn.addEventListener("click",()=>{
      window.close();
    });

    closeBtn.addEventListener("click",()=>{
      infoBox.style.display="none";
    });
  </script>
</body>
</html>
