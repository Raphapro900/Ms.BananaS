<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ms. BananaS - Juego Completo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      color: #FFD700;
      text-align: center;
      overflow: hidden;
    }

    /* Pantalla de inicio */
    #startScreen {
      width: 100%;
      height: 100vh;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #startScreen h1 {
      font-size: 3em;
      text-shadow: 2px 2px 8px red;
    }

    #bananaStart {
      width: 220px;
      cursor: pointer;
      margin-top: 40px;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    #bananaStart:hover {
      transform: scale(1.15) rotate(-5deg);
      filter: drop-shadow(0 0 15px yellow);
    }

    .menu-text {
      margin-top: 20px;
      font-size: 1.5em;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    /* Pantalla de juego */
    #gameScreen {
      display: none;
      width: 100%;
      height: 100vh;
      background-image: url('Room.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      position: relative;
    }

    #bananaGame {
      position: absolute;
      left: 10%;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      opacity: 0;
      animation: appear 2s ease forwards;
      animation-delay: 2s;
    }

    @keyframes appear {
      to { opacity: 1; }
    }

    #tv {
      position: absolute;
      left: 55%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      height: 270px;
      background-color: black;
      border: 4px solid #333;
      box-shadow: 0 0 20px #000;
    }

    #animal {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .options {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    .options button {
      font-size: 1.2em;
      padding: 10px 20px;
      background-color: #222;
      color: #FFD700;
      border: 2px solid #FFD700;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .options button:hover {
      background-color: #444;
    }

    /* Cuadro de diálogo */
    #dialogueBox {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      padding: 15px;
      background-color: rgba(0,0,0,0.7);
      color: #FFD700;
      font-size: 1.2em;
      border: 2px solid #FFD700;
      display: none;
    }

    /* Texto de furia */
    #rageText {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5em;
      color: red;
    }
  </style>
</head>
<body>
  <!-- Pantalla de inicio -->
  <div id="startScreen">
    <h1>Ms. BananaS</h1>
    <p class="menu-text">Haz clic en la banana para comenzar</p>
    <img id="bananaStart" src="banana.png" alt="Ms. BananaS">
    <audio id="menuMusic" src="bananamenu.mp3" autoplay loop></audio>
  </div>

  <!-- Pantalla de juego -->
  <div id="gameScreen">
    <audio id="roomMusic" src="Room Theme.mp3" loop></audio>
    <img id="bananaGame" src="banana.png" alt="Ms. BananaS">

    <div id="tv">
      <img id="animal" src="Seal.webp" alt="Animal">
    </div>

    <div class="options">
      <button>Seal</button>
      <button>Dog</button>
      <button>Cat</button>
      <button>Duck</button>
      <button>Eagle</button>
      <button>Snake</button>
    </div>

    <div id="dialogueBox">¡Bienvenido al primer día!</div>
    <audio id="dialogueAudio"></audio>

    <div id="rageText">Furia: 0</div>
  </div>

  <script>
    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const bananaStart = document.getElementById("bananaStart");
    const menuMusic = document.getElementById("menuMusic");
    const roomMusic = document.getElementById("roomMusic");
    const dialogueBox = document.getElementById("dialogueBox");
    const dialogueAudio = document.getElementById("dialogueAudio");
    const animalImg = document.getElementById("animal");
    const rageText = document.getElementById("rageText");
    const bananaGame = document.getElementById("bananaGame");
    const buttons = document.querySelectorAll(".options button");

    const animals = [
      {name:"Seal", file:"Seal.webp"},
      {name:"Dog", file:"Dog.jfif"},
      {name:"Cat", file:"Cat.jpj"},
      {name:"Duck", file:"Duck.avif"},
      {name:"Eagle", file:"Aguila.webp"},
      {name:"Snake", file:"Snake.jfif"}
    ];

    let currentAnimal = animals[0];
    let rage = 0;

    bananaStart.addEventListener("click", () => {
      startScreen.style.display = "none";
      gameScreen.style.display = "block";
      menuMusic.pause();
      roomMusic.play();

      dialogueBox.innerText = "¡Bienvenido al primer día!";
      dialogueAudio.src = "Primer dia.wav";
      dialogueBox.style.display = "block";
      dialogueAudio.play();
    });

    function nextAnimal() {
      currentAnimal = animals[Math.floor(Math.random()*animals.length)];
      animalImg.src = currentAnimal.file;
      animalImg.alt = currentAnimal.name;
      buttons.forEach(btn => {
        btn.style.backgroundColor = "#222";
      });
    }

    function checkFury() {
      if (rage >= 10) {
        rageText.innerText = "Furia: 10 (¡Máxima!)";
        // Cambiar banana
        bananaGame.src = "banana2.png";
        // Música lenta y reversa (simulación con playbackRate negativo no funciona en todos los navegadores)
        roomMusic.playbackRate = 0.5; // más lenta
        // Para simular reversa se necesitaría un audio editado, aquí solo se baja la velocidad
      }
    }

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        if (btn.innerText === currentAnimal.name) {
          // Correcto
          btn.style.backgroundColor = "green";
          const correctAudios = ["c1.wav","c2.wav","c3.wav","c4.wav"];
          dialogueAudio.src = correctAudios[Math.floor(Math.random()*correctAudios.length)];
          dialogueBox.innerText = "¡Correcto!";
          dialogueBox.style.display = "block";
          dialogueAudio.play();
          setTimeout(nextAnimal, 2000);
        } else {
          // Incorrecto
          btn.style.backgroundColor = "red";
          buttons.forEach(b => {
            if (b.innerText === currentAnimal.name) {
              b.style.backgroundColor = "yellow";
            }
          });
          rage++;
          rageText.innerText = "Furia: " + rage;
          checkFury();
          const failAudios = ["f1.wav","f2.wav","f3.wav","f4.wav"];
          dialogueAudio.src = failAudios[Math.floor(Math.random()*failAudios.length)];
        dialogueBox.innerText = "¡Fallaste!";
        dialogueBox.style.display = "block";
        dialogueAudio.play();
        setTimeout(nextAnimal, 2000);
      }
    });
  });

  function checkFury() {
    if (rage >= 10) {
      rageText.innerText = "Furia: 10 (¡Máxima!)";
      // Cambiar banana
      bananaGame.src = "banana2.png";
      // Música lenta (simulación)
      roomMusic.playbackRate = 0.5;
      // Nota: reversa real requiere un audio editado previamente
    }
  }

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      if (btn.innerText === currentAnimal.name) {
        // Correcto
        btn.style.backgroundColor = "green";
        const correctAudios = ["c1.wav","c2.wav","c3.wav","c4.wav"];
        dialogueAudio.src = correctAudios[Math.floor(Math.random()*correctAudios.length)];
        dialogueBox.innerText = "¡Correcto!";
        dialogueBox.style.display = "block";
        dialogueAudio.play();
        setTimeout(nextAnimal, 2000);
      } else {
        // Incorrecto
        btn.style.backgroundColor = "red";
        buttons.forEach(b => {
          if (b.innerText === currentAnimal.name) {
            b.style.backgroundColor = "yellow";
          }
        });
        rage++;
        rageText.innerText = "Furia: " + rage;
        checkFury();
        const failAudios = ["f1.wav","f2.wav","f3.wav","f4.wav"];
        dialogueAudio.src = failAudios[Math.floor(Math.random()*failAudios.length)];
        dialogueBox.innerText = "¡Fallaste!";
        dialogueBox.style.display = "block";
        dialogueAudio.play();
        setTimeout(nextAnimal, 2000);
      }
    });
  });
</script>
</body>
</html>
