<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ms. BananaS - Persecución VHS</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* ========== ESTILOS COMPLETOS ========== */
    * { user-select: none; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; font-family: 'Courier New', monospace; background: black; color: #FFD700; text-align: center; overflow: hidden; }
    #startScreen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(-45deg, #1a0a00, #3d1a00, #1f0f00, #2a1500); background-size: 400% 400%; animation: gradientBG 8s ease infinite; position: relative; z-index: 10; }
    @keyframes gradientBG { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .menuPanel { background: rgba(0,0,0,0.7); padding: 30px; border: 3px solid #FF6600; border-radius: 15px; box-shadow: 0 0 30px #ff3300; display: flex; flex-direction: row; gap: 40px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .menuBtn { font-size: 1.3em; padding: 15px 25px; margin: 10px; background: #1a0a00; color: #FF9900; border: 2px solid #FF6600; cursor: pointer; transition: transform .2s ease, box-shadow .2s ease; border-radius: 8px; font-family: monospace; }
    .menuBtn:hover { transform: scale(1.1); box-shadow: 0 0 15px #FF6600; background: #331100; }
    #bananaPlay { width: 180px; cursor: pointer; transition: transform .3s ease, filter .3s ease; animation: float 3s ease-in-out infinite; margin: 20px; filter: drop-shadow(0 0 10px #ffaa00); }
    #bananaPlay:hover { transform: scale(1.1) rotate(-5deg); filter: drop-shadow(0 0 20px #ffcc00); }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    footer { margin-top: 20px; font-size: .9em; color: #884400; }
    #infoBox { display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); width: 70%; padding: 20px; background: rgba(0,0,0,.95); color: #FF9900; border: 2px solid #FF6600; border-radius: 10px; z-index: 20; }
    #closeBtn { position: absolute; top: 5px; right: 10px; cursor: pointer; font-size: 1.2em; color: #FF6600; }
    #gameScreen { display: none; width: 100%; height: 100vh; background: url('Room.png') center/cover no-repeat; position: relative; }
    #bananaGame { position: absolute; left: 10%; top: 50%; transform: translateY(-50%); width: 300px; animation: float 3s ease-in-out infinite; pointer-events: none; }
    #tv { position: absolute; left: 55%; top: 50%; transform: translate(-50%,-50%); width: 480px; height: 270px; background: black; border: 4px solid #333; box-shadow: 0 0 20px #000; border-radius: 10px; }
    #animal { width: 100%; height: 100%; object-fit: contain; }
    .options { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; z-index: 5; }
    .options button { font-size: 1.2em; padding: 10px 20px; background: #1a0a00; color: #FF9900; border: 2px solid #FF6600; cursor: pointer; font-family: monospace; transition: 0.1s; }
    #dialogueBox { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 70%; padding: 15px; background: rgba(0,0,0,.9); color: #FFD700; font-size: 1.3em; border: 2px solid #FF6600; border-radius: 10px; display: none; z-index: 15; font-weight: bold; text-shadow: 0 0 5px #ff6600; }
    #rageText { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-size: 1.5em; color: #ff4444; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-family: monospace; z-index: 5; }
    #dayText { position: absolute; top: 140px; left: 50%; transform: translateX(-50%); font-size: 1.2em; color: #FFAA44; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; font-family: monospace; z-index: 5; }
    #jumpscare { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; }
    #jumpscare video { width: 100%; height: 100%; object-fit: cover; }
    #chaseContainer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: #000; cursor: grab; }
    .vhs-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1002; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 6px); animation: vhsScanlines 0.2s infinite linear; }
    .vhs-noise { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1003; background: repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,0.02) 0px, rgba(0,0,0,0.1) 2px); animation: vhsFlicker 0.15s infinite; opacity: 0.3; }
    @keyframes vhsScanlines { 0% { transform: translateY(0); } 100% { transform: translateY(4px); } }
    @keyframes vhsFlicker { 0%,100% { opacity: 0.2; } 50% { opacity: 0.35; } }
    .glitch-transition { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 2000; pointer-events: none; animation: glitchEffect 0.8s ease-out; }
    @keyframes glitchEffect { 0% { opacity: 0; } 10% { opacity: 1; background: #0a0a0a; transform: translate(0); } 20% { opacity: 1; background: #1a0000; transform: translate(-3px, 0); } 30% { opacity: 1; background: #001a00; transform: translate(3px, 0); } 40% { opacity: 0.8; background: #00001a; transform: translate(0, 0); } 60% { opacity: 0.5; background: #0a0a0a; } 100% { opacity: 0; background: black; transform: translate(0); } }
    .chaseUI { position: absolute; bottom: 20px; left: 20px; color: #ffaa33; font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; z-index: 1004; pointer-events: none; }
    .lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0000aa; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Share Tech Mono', 'VCR OSD Mono', monospace; color: white; text-align: center; }
    .lock-screen h1 { font-size: 4rem; margin-bottom: 1rem; letter-spacing: 2px; }
    .lock-screen p { font-size: 1.5rem; max-width: 80%; line-height: 1.4; }
    .reset-signal { margin-top: 2rem; font-size: 0.9rem; opacity: 0.8; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 8px; max-width: 80%; word-break: break-all; font-family: monospace; }
    .reset-link { margin-top: 20px; color: #ffaa44; font-size: 0.9rem; }
    .reset-link a { color: #ffaa44; text-decoration: none; border-bottom: 1px solid #ffaa44; }
    .reset-link a:hover { color: #ffdd88; }
  </style>
</head>
<body>

  <div id="lockScreen" class="lock-screen" style="display: none;">
    <h1>GAME NOT FOUND.</h1>
    <p>Juego bloqueado. Esperando señal de reseteo...</p>
    <div class="reset-signal" id="resetSignal">🔄 Buscando señal en localStorage...</div>
    <div class="reset-link">🔗 <a href="https://raphapro900.github.io/reset/" target="_blank">Ir al panel de reset</a></div>
  </div>

  <div id="gameContent">
    <div id="startScreen">
      <h1 style="text-shadow: 0 0 10px #ff6600;">🍌 Ms. BananaS 🍌</h1>
      <div class="menuPanel">
        <img id="bananaPlay" src="banana.png" alt="Ms.BananaS">
        <div>
          <button class="menuBtn" id="howBtn">📖 How to Play</button><br>
          <button class="menuBtn" id="shopBtn">🛒 Shop</button><br>
          <button class="menuBtn" id="exitBtn">🚪 Exit</button>
        </div>
      </div>
      <audio id="menuMusic" src="bananamenu.mp3" loop></audio>
      <footer>CC0 Raphapro900 - V1.0</footer>
      <div id="infoBox"><span id="closeBtn">✖</span><div id="infoContent"></div></div>
    </div>

    <div id="gameScreen">
      <audio id="roomMusic" src="Room Theme.mp3" loop></audio>
      <img id="bananaGame" src="banana.png" alt="Ms. BananaS">
      <div id="tv"><img id="animal" src="Seal.webp" alt="Animal"></div>
      <div class="options">
        <button>Seal</button><button>Dog</button><button>Cat</button>
        <button>Duck</button><button>Eagle</button><button>Snake</button>
      </div>
      <div id="dialogueBox"></div>
      <audio id="dialogueAudio" preload="auto"></audio>
      <div id="rageText">💢 Furia: 0</div>
      <div id="dayText">🌙 Día 1 — Animales: 0/15</div>
    </div>

    <div id="jumpscare">
      <video id="jumpscareVideo" src="jumpscare.mp4"></video>
    </div>

    <div id="chaseContainer">
      <canvas id="threeCanvas" style="width:100%;height:100%;display:block;"></canvas>
      <div class="vhs-overlay"></div>
      <div class="vhs-noise"></div>
      <div class="chaseUI">🍌 ¡TE PERSIGUE!</div>
      <audio id="chaseMusic" src="chase.mp3" loop preload="auto"></audio>
      <audio id="heartbeatSound" src="latido de corazon.mp3" preload="auto"></audio>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ==================== SISTEMA DE BLOQUEO ====================
    const LOCK_STORAGE_KEY = "gameLocked_V5";
    const RESET_SIGNAL_KEY = "resetSignal";
    
    function setGameLocked() { localStorage.setItem(LOCK_STORAGE_KEY, "true"); localStorage.removeItem(RESET_SIGNAL_KEY); console.log("🔒 Juego bloqueado"); }
    function isGameLocked() { return localStorage.getItem(LOCK_STORAGE_KEY) === "true"; }
    function clearGameLocked() { localStorage.removeItem(LOCK_STORAGE_KEY); console.log("🔓 Juego desbloqueado"); }
    function checkForResetSignal() { const signal = localStorage.getItem(RESET_SIGNAL_KEY); if (signal === "reset") { localStorage.removeItem(RESET_SIGNAL_KEY); clearGameLocked(); return true; } return false; }

    const lockScreen = document.getElementById('lockScreen');
    const gameContent = document.getElementById('gameContent');
    const menuMusic = document.getElementById('menuMusic');
    const roomMusic = document.getElementById('roomMusic');
    const resetSignalDiv = document.getElementById('resetSignal');

    function stopAllGameMusic() { if (menuMusic) { menuMusic.pause(); menuMusic.currentTime = 0; } if (roomMusic) { roomMusic.pause(); roomMusic.currentTime = 0; } }

    if (isGameLocked()) {
      if (checkForResetSignal()) { window.location.reload(); } 
      else { gameContent.style.display = 'none'; lockScreen.style.display = 'flex'; stopAllGameMusic(); startPollingForReset(); }
    } else { gameContent.style.display = 'block'; lockScreen.style.display = 'none'; iniciarJuego(); }

    function startPollingForReset() {
      let pollInterval, attempts = 0;
      function checkLocalStorageSignal() {
        attempts++;
        if (resetSignalDiv) resetSignalDiv.innerHTML = `🔄 Buscando señal... (Intento ${attempts})<br>📡 Revisando localStorage...`;
        const signal = localStorage.getItem(RESET_SIGNAL_KEY);
        if (signal === "reset") {
          if (resetSignalDiv) resetSignalDiv.innerHTML = '✅ ¡SEÑAL DE RESET DETECTADA! Desbloqueando...';
          localStorage.removeItem(RESET_SIGNAL_KEY);
          clearInterval(pollInterval);
          clearGameLocked();
          setTimeout(() => window.location.reload(), 1000);
          return true;
        }
        return false;
      }
      checkLocalStorageSignal();
      pollInterval = setInterval(checkLocalStorageSignal, 2000);
    }

    // ==================== JUEGO PRINCIPAL ====================
    function iniciarJuego() {
      const bananaPlay = document.getElementById("bananaPlay");
      const howBtn = document.getElementById("howBtn");
      const shopBtn = document.getElementById("shopBtn");
      const exitBtn = document.getElementById("exitBtn");
      const infoBox = document.getElementById("infoBox");
      const infoContent = document.getElementById("infoContent");
      const closeBtn = document.getElementById("closeBtn");
      const startScreen = document.getElementById("startScreen");
      const gameScreen = document.getElementById("gameScreen");
      const animalImg = document.getElementById("animal");
      const dialogueBox = document.getElementById("dialogueBox");
      const dialogueAudio = document.getElementById("dialogueAudio");
      const rageText = document.getElementById("rageText");
      const dayText = document.getElementById("dayText");
      const jumpscareDiv = document.getElementById("jumpscare");
      const jumpscareVideo = document.getElementById("jumpscareVideo");
      const buttons = document.querySelectorAll(".options button");
      const chaseContainer = document.getElementById("chaseContainer");
      const chaseMusic = document.getElementById("chaseMusic");
      const heartbeatSound = document.getElementById("heartbeatSound");

      const animals = [
        { name: "Seal", file: "Seal.webp" },
        { name: "Dog", file: "Dog.jfif" },
        { name: "Cat", file: "Cat.jpj" },
        { name: "Duck", file: "Duck.avif" },
        { name: "Eagle", file: "Aguila.webp" },
        { name: "Snake", file: "Snake.jfif" }
      ];
      
      let currentAnimal = animals[0];
      let rage = 0;
      let day = 1;
      let correctCount = 0;
      const dayTargets = { 1: 15, 2: 22, 3: 31, 4: 39, 5: 46 };
      let gameActive = true;
      let currentTimeout = null;
      let dialogueTimeout = null;

      function playSound(audioElement, src, volume = 0.8) {
        if (!audioElement) return;
        audioElement.volume = volume;
        audioElement.src = src;
        audioElement.currentTime = 0;
        const playPromise = audioElement.play();
        if (playPromise !== undefined) {
          playPromise.catch(error => {
            console.warn(`⚠️ No se pudo reproducir ${src}:`, error);
          });
        }
      }

      function showDialogue(text, audioSrc) {
        if (!gameActive) return;
        if (dialogueTimeout) clearTimeout(dialogueTimeout);
        
        dialogueBox.innerText = text;
        dialogueBox.style.display = "block";
        
        if (audioSrc) {
          playSound(dialogueAudio, audioSrc, 0.8);
          dialogueAudio.onended = () => {
            if (gameActive) {
              dialogueTimeout = setTimeout(() => { dialogueBox.style.display = "none"; }, 500);
            }
          };
        } else {
          dialogueTimeout = setTimeout(() => { if (gameActive) dialogueBox.style.display = "none"; }, 2000);
        }
      }

      function nextAnimal() {
        if (!gameActive) return;
        if (currentTimeout) clearTimeout(currentTimeout);
        currentAnimal = animals[Math.floor(Math.random() * animals.length)];
        animalImg.src = currentAnimal.file;
        animalImg.alt = currentAnimal.name;
        buttons.forEach(btn => btn.style.backgroundColor = "#1a0a00");
      }

      function triggerJumpscareFinal() {
        console.log("💀 JUMPSCARE - Guardando bloqueo");
        setGameLocked();
        jumpscareDiv.style.display = "block";
        jumpscareVideo.play();
        jumpscareVideo.onended = () => {
          window.location.href = "https://raw.githubusercontent.com/Raphapro900/Ms.BananaS/refs/heads/main/You%20know%20nothing%2C%20IDIOT.png";
        };
      }

      // ==================== PERSECUCIÓN 3D CON ÁRBOLES tree_ps1.png ====================
      let chaseActive = false;
      let chaseAnimationId = null;
      let scene, camera, renderer;
      let bananaMonster;
      let monsterPos = { x: 28, z: 22 };
      let playerPos = { x: 0, z: 0 };
      let yaw = 0, pitch = 0;
      let keys = { w: false, s: false, a: false, d: false, shift: false };
      let monsterSpeed = 3.5;
      let playerBaseSpeed = 5.2;
      let runningMult = 1.0;
      let gameOverTriggered = false;
      let chaseStartTime = 0;
      let heartbeatInterval = null;
      
      // Textura de árboles con tree_ps1.png (sprite billboard como Baldi's Basics)
      const treeTextureUrl = "https://raw.githubusercontent.com/Raphapro900/Ms.BananaS/refs/heads/main/tree_ps1.png";
      
      function createTreeSprite(x, z) {
        const textureLoader = new THREE.TextureLoader();
        const treeTexture = textureLoader.load(treeTextureUrl);
        const material = new THREE.SpriteMaterial({ map: treeTexture, transparent: true });
        const sprite = new THREE.Sprite(material);
        sprite.scale.set(1.8, 2.2, 1);
        sprite.position.set(x, 1.1, z);
        return sprite;
      }
      
      function updateHeartbeat(distance) {
        if (!heartbeatSound) return;
        let speed = 1.0;
        if (distance < 3) speed = 2.2;
        else if (distance < 5) speed = 1.6;
        else if (distance < 8) speed = 1.1;
        else if (distance < 12) speed = 0.7;
        else {
          if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
          heartbeatSound.pause(); heartbeatSound.currentTime = 0;
          return;
        }
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatSound.playbackRate = speed;
        heartbeatSound.volume = Math.min(0.8, 0.3 + (12 - distance) / 20);
        heartbeatSound.loop = true;
        heartbeatSound.play().catch(e => console.log("heartbeat error"));
        const intervalTime = 1000 / (speed * 1.5);
        heartbeatInterval = setInterval(() => {
          if (chaseActive && !gameOverTriggered) {
            heartbeatSound.currentTime = 0;
            heartbeatSound.play().catch(e => {});
          }
        }, intervalTime);
      }
      
      function stopHeartbeat() {
        if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
        if (heartbeatSound) { heartbeatSound.pause(); heartbeatSound.currentTime = 0; }
      }

      function applyShake(intensity) {
        if (!chaseActive || gameOverTriggered) return;
        const strength = Math.min(intensity, 12);
        const canvas = renderer.domElement;
        const xShake = (Math.random() - 0.5) * strength;
        const yShake = (Math.random() - 0.5) * strength;
        canvas.style.transform = `translate(${xShake}px, ${yShake}px)`;
        setTimeout(() => { if (canvas && chaseActive && !gameOverTriggered) canvas.style.transform = "translate(0px, 0px)"; }, 80);
      }

      function updateForestColor(distance) {
        if (!scene) return;
        let r = 0.03, g = 0.11, b = 0.23;
        if (distance < 5) { const intensity = Math.min(1, (5 - distance) / 3); r = 0.25 + intensity * 0.4; g = 0.05 + intensity * 0.08; b = 0.05; }
        else if (distance < 10) { const intensity = (10 - distance) / 5; r = 0.12 + intensity * 0.15; g = 0.08 + intensity * 0.04; b = 0.1; }
        scene.background = new THREE.Color(r, g, b);
        if (scene.fog) scene.fog.color = new THREE.Color(r, g, b);
      }
      
      function updateChaseAudio(distance) {
        if (!chaseMusic) return;
        if (distance < 8) { chaseMusic.playbackRate = 1.2; chaseMusic.volume = 0.9; }
        else if (distance < 15) { chaseMusic.playbackRate = 1.0; chaseMusic.volume = 0.7; }
        else { chaseMusic.playbackRate = 0.7; chaseMusic.volume = 0.5; }
      }

      function initChaseGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030b17);
        scene.fog = new THREE.FogExp2(0x030b17, 0.03);
        camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.05, 200);
        camera.position.set(0, 1.68, 0);
        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("threeCanvas"), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        
        // Suelo
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.9 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(140, 140), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Árboles con textura tree_ps1.png (sprites que siempre miran al jugador)
        const treePositions = [];
        for (let i = 0; i < 200; i++) {
          let angle = Math.random() * Math.PI * 2;
          let radius = 25 + Math.random() * 52;
          treePositions.push({ x: Math.cos(angle) * radius, z: Math.sin(angle) * radius });
        }
        for (let i = 0; i < 80; i++) {
          let x = (Math.random() - 0.5) * 110;
          let z = (Math.random() - 0.5) * 110;
          if (Math.abs(x) > 8 || Math.abs(z) > 8) treePositions.push({ x, z });
        }
        treePositions.forEach(pos => scene.add(createTreeSprite(pos.x, pos.z)));
        
        // Luciérnagas
        const fireflyMat = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.07 });
        const fireflyCount = 400;
        const fireflyPositions = [];
        for (let i = 0; i < fireflyCount; i++) fireflyPositions.push((Math.random() - 0.5) * 120, Math.random() * 3.5, (Math.random() - 0.5) * 120);
        const fireflyGeo = new THREE.BufferGeometry();
        fireflyGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(fireflyPositions), 3));
        const fireflies = new THREE.Points(fireflyGeo, fireflyMat);
        scene.add(fireflies);
        
        // Luces
        const ambientLight = new THREE.AmbientLight(0x1a1a2e);
        scene.add(ambientLight);
        const moonLight = new THREE.DirectionalLight(0xccaa88, 0.7);
        moonLight.position.set(12, 24, -14);
        moonLight.castShadow = true;
        scene.add(moonLight);
        const fillLight = new THREE.PointLight(0x664422, 0.35);
        fillLight.position.set(-4, 5, -6);
        scene.add(fillLight);
        
        // Banana monstruo (banana2.png)
        const textureLoader = new THREE.TextureLoader();
        const banana2Texture = textureLoader.load("https://raw.githubusercontent.com/Raphapro900/Ms.BananaS/refs/heads/main/banana2.png");
        const spriteMaterial = new THREE.SpriteMaterial({ map: banana2Texture, transparent: true });
        bananaMonster = new THREE.Sprite(spriteMaterial);
        bananaMonster.scale.set(1.8, 2.8, 1);
        bananaMonster.position.set(monsterPos.x, 1.0, monsterPos.z);
        scene.add(bananaMonster);
        
        // Controles de ratón
        chaseContainer.addEventListener('click', () => chaseContainer.requestPointerLock());
        document.addEventListener('pointerlockchange', lockChange);
        function lockChange() {
          if (document.pointerLockElement === chaseContainer) document.addEventListener('mousemove', onMouseMove);
          else document.removeEventListener('mousemove', onMouseMove);
        }
        function onMouseMove(e) {
          if (!chaseActive || gameOverTriggered) return;
          const sens = 0.0022;
          yaw -= e.movementX * sens;
          pitch -= e.movementY * sens;
          pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
          camera.rotation.order = 'YXZ';
          camera.rotation.y = yaw;
          camera.rotation.x = pitch;
        }
        
        // Controles WASD: W = atrás, S = adelante
        window.addEventListener('keydown', (e) => {
          const key = e.key.toLowerCase();
          if (key === 'w') keys.w = true;
          if (key === 's') keys.s = true;
          if (key === 'a') keys.a = true;
          if (key === 'd') keys.d = true;
          if (key === 'shift') { keys.shift = true; runningMult = 1.85; }
          e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
          const key = e.key.toLowerCase();
          if (key === 'w') keys.w = false;
          if (key === 's') keys.s = false;
          if (key === 'a') keys.a = false;
          if (key === 'd') keys.d = false;
          if (key === 'shift') { keys.shift = false; runningMult = 1.0; }
        });
        
        let lastTimestamp = performance.now();
        chaseStartTime = performance.now() / 1000;
        
        function updateChase() {
          if (!chaseActive) return;
          const now = performance.now();
          let delta = Math.min(0.033, (now - lastTimestamp) / 1000);
          lastTimestamp = now;
          if (delta <= 0) delta = 0.016;
          
          // Velocidad del monstruo aumenta cada segundo
          const elapsedSeconds = (performance.now() / 1000) - chaseStartTime;
          let currentMonsterSpeed = monsterSpeed + Math.floor(elapsedSeconds) * 0.35;
          currentMonsterSpeed = Math.min(currentMonsterSpeed, 7.5);
          
          const currentPlayerSpeed = playerBaseSpeed * runningMult;
          let moveX = 0, moveZ = 0;
          if (keys.w) moveZ = 1;
          if (keys.s) moveZ = -1;
          if (keys.a) moveX = -1;
          if (keys.d) moveX = 1;
          
          if (moveX !== 0 || moveZ !== 0) {
            const len = Math.hypot(moveX, moveZ);
            moveX /= len; moveZ /= len;
            const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            playerPos.x += (forward.x * moveZ + right.x * moveX) * currentPlayerSpeed * delta;
            playerPos.z += (forward.z * moveZ + right.z * moveX) * currentPlayerSpeed * delta;
          }
          playerPos.x = Math.min(Math.max(playerPos.x, -58), 58);
          playerPos.z = Math.min(Math.max(playerPos.z, -58), 58);
          camera.position.x = playerPos.x;
          camera.position.z = playerPos.z;
          
          const dx = playerPos.x - monsterPos.x;
          const dz = playerPos.z - monsterPos.z;
          let distToPlayer = Math.hypot(dx, dz);
          
          updateChaseAudio(distToPlayer);
          updateHeartbeat(distToPlayer);
          updateForestColor(distToPlayer);
          
          // Vibración al acercarse
          if (distToPlayer < 6.5) {
            let intensity = 0;
            if (distToPlayer < 2.0) intensity = 12;
            else if (distToPlayer < 3.5) intensity = 8;
            else if (distToPlayer < 5.0) intensity = 5;
            else if (distToPlayer < 6.5) intensity = 3;
            if (intensity > 0) applyShake(intensity);
          }
          
          // Velocidad extra si está cerca
          let finalMonsterSpeed = currentMonsterSpeed;
          if (distToPlayer < 4) finalMonsterSpeed += 1.2;
          else if (distToPlayer < 8) finalMonsterSpeed += 0.6;
          
          if (distToPlayer > 0.7) {
            const moveDirX = dx / distToPlayer;
            const moveDirZ = dz / distToPlayer;
            monsterPos.x += moveDirX * finalMonsterSpeed * delta;
            monsterPos.z += moveDirZ * finalMonsterSpeed * delta;
          }
          bananaMonster.position.set(monsterPos.x, 1.0, monsterPos.z);
          
          // Escala dinámica
          const scaleVal = Math.min(3.2, Math.max(1.8, 1.8 + (6.0 / (distToPlayer + 1.0))));
          bananaMonster.scale.set(scaleVal, scaleVal, 1);
          
          if (distToPlayer <= 1.3 && !gameOverTriggered) {
            gameOverTriggered = true;
            chaseActive = false;
            if (chaseAnimationId) cancelAnimationFrame(chaseAnimationId);
            stopHeartbeat();
            chaseMusic.pause();
            chaseContainer.style.display = "none";
            triggerJumpscareFinal();
            return;
          }
          
          fireflies.rotation.y += 0.003;
          renderer.render(scene, camera);
          chaseAnimationId = requestAnimationFrame(updateChase);
        }
        
        playerPos = { x: 0, z: 0 };
        monsterPos = { x: 38, z: 32 };
        yaw = 0; pitch = 0;
        camera.rotation.y = 0; camera.rotation.x = 0;
        camera.position.set(0, 1.68, 0);
        gameOverTriggered = false;
        runningMult = 1;
        lastTimestamp = performance.now();
        chaseStartTime = performance.now() / 1000;
        updateChase();
      }
      
      function startChaseMinigame() {
        if (chaseActive) return;
        const glitchDiv = document.createElement('div');
        glitchDiv.className = 'glitch-transition';
        document.body.appendChild(glitchDiv);
        setTimeout(() => {
          glitchDiv.remove();
          chaseActive = true;
          chaseContainer.style.display = "flex";
          chaseMusic.currentTime = 0;
          chaseMusic.loop = true;
          chaseMusic.volume = 0.7;
          chaseMusic.play().catch(e => console.log("chaseMusic error:", e));
          initChaseGame();
        }, 800);
      }
      
      function onRageReachedTen() {
        if (!gameActive) return;
        gameActive = false;
        roomMusic.pause();
        gameScreen.style.display = "none";
        startChaseMinigame();
      }
      
      // ==================== EVENTOS DE LOS BOTONES ====================
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          if (!gameActive) return;
          
          if (btn.innerText === currentAnimal.name) {
            btn.style.backgroundColor = "#2a6a2a";
            correctCount++;
            dayText.innerText = "🌙 Día " + day + " — Animales: " + correctCount + "/" + dayTargets[day];
            showDialogue("✅ ¡Correcto!", "c1.mp3");
            
            if (correctCount >= dayTargets[day]) {
              showDialogue("✨ ¡Completaste el día " + day + "!", "c2.mp3");
              setTimeout(() => {
                gameScreen.style.display = "none";
                roomMusic.pause();
                menuMusic.currentTime = 0;
                menuMusic.play().catch(e => console.log("menuMusic error:", e));
                startScreen.style.display = "flex";
                gameActive = true;
                rage = 0; correctCount = 0; day = 1;
                rageText.innerText = "💢 Furia: 0";
                dayText.innerText = "🌙 Día 1 — Animales: 0/15";
                nextAnimal();
              }, 4000);
            }
            setTimeout(nextAnimal, 2000);
          } else {
            btn.style.backgroundColor = "#882222";
            buttons.forEach(b => { if (b.innerText === currentAnimal.name) b.style.backgroundColor = "#aa6644"; });
            rage++;
            rageText.innerText = "💢 Furia: " + rage;
            showDialogue("❌ ¡Fallaste! El animal era " + currentAnimal.name, "f1.mp3");
            
            if (rage >= 10) { onRageReachedTen(); } 
            else { setTimeout(nextAnimal, 2000); }
          }
        });
      });
      
      function resetGameScreenState() {
        gameActive = true;
        rage = 0; correctCount = 0; day = 1;
        rageText.innerText = "💢 Furia: 0";
        dayText.innerText = "🌙 Día 1 — Animales: 0/15";
        nextAnimal();
      }
      
      bananaPlay.addEventListener("click", () => {
        startScreen.style.display = "none";
        gameScreen.style.display = "block";
        menuMusic.pause();
        roomMusic.currentTime = 0;
        roomMusic.play().catch(e => console.log("roomMusic error:", e));
        resetGameScreenState();
        showDialogue("🍌 ¡Bienvenido al primer día! Selecciona el animal correcto en la televisión.", "Primer dia.mp3");
      });
      
      howBtn.addEventListener("click", () => {
        infoBox.style.display = "block";
        infoContent.innerHTML = "<h2>📜 How to Play</h2><p>Elige el animal correcto en la tele. Cada fallo aumenta la FURIA. Al llegar a 10, entrarás al BOSQUE NOCTURNO.<br><br>🎮 Controles:<br>W = Atrás<br>S = Adelante<br>A = Izquierda<br>D = Derecha<br>SHIFT = Correr<br>🖱️ Ratón = Mirar<br><br>⚠️ Si te alcanza → JUMPSCARE y BLOQUEO PERMANENTE<br><br>🔓 Para desbloquear, ve a: <strong style='color:#ffaa44'>https://raphapro900.github.io/reset/</strong></p>";
      });
      
      shopBtn.addEventListener("click", () => {
        infoBox.style.display = "block";
        infoContent.innerHTML = "<h2>🛒 Tienda</h2><p>Próximamente: objetos especiales para reducir furia.</p>";
      });
      
      exitBtn.addEventListener("click", () => window.close());
      closeBtn.addEventListener("click", () => infoBox.style.display = "none");
      
      nextAnimal();
    }
  </script>
</body>
