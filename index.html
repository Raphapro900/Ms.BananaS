<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ms. BananaS - Juego Completo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      color: #FFD700;
      text-align: center;
      overflow: hidden;
    }

    /* Pantalla de inicio */
    #startScreen {
      width: 100%;
      height: 100vh;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #startScreen h1 {
      font-size: 3em;
      text-shadow: 2px 2px 8px red;
    }

    #bananaStart {
      width: 220px;
      cursor: pointer;
      margin-top: 40px;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    #bananaStart:hover {
      transform: scale(1.15) rotate(-5deg);
      filter: drop-shadow(0 0 15px yellow);
    }

    .menu-text {
      margin-top: 20px;
      font-size: 1.5em;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    /* Pantalla de juego */
    #gameScreen {
      display: none;
      width: 100%;
      height: 100vh;
      background-image: url('Room.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      position: relative;
    }

    #bananaGame {
      position: absolute;
      left: 50%;
      top: 20%;
      transform: translateX(-50%);
      width: 180px;
      opacity: 0;
      animation: float 3s ease-in-out infinite, appear 2s ease forwards;
      animation-delay: 2s;
    }

    @keyframes float {
      0% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
      100% { transform: translateX(-50%) translateY(0); }
    }

    @keyframes appear {
      to { opacity: 1; }
    }

    #tv {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      height: 270px;
      background-color: black;
      border: 4px solid #333;
      box-shadow: 0 0 20px #000;
    }

    #animal {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .options {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    .options button {
      font-size: 1.2em;
      padding: 10px 20px;
      background-color: #222;
      color: #FFD700;
      border: 2px solid #FFD700;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .options button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
  <!-- Pantalla de inicio -->
  <div id="startScreen">
    <h1>Ms. BananaS</h1>
    <p class="menu-text">Haz clic en la banana para comenzar</p>
    <img id="bananaStart" src="banana.png" alt="Ms. BananaS">
    <audio id="menuMusic" src="bananamenu.mp3" autoplay loop></audio>
  </div>

  <!-- Pantalla de juego -->
  <div id="gameScreen">
    <audio id="roomMusic" src="Room Theme.mp3" loop></audio>
    <img id="bananaGame" src="banana.png" alt="Ms. BananaS">

    <div id="tv">
      <img id="animal" src="Seal.webp" alt="Animal">
    </div>

    <div class="options">
      <button>Seal</button>
      <button>Dog</button>
      <button>Cat</button>
      <button>Duck</button>
      <button>Eagle</button>
      <button>Snake</button>
    </div>
  </div>

  <script>
    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const bananaStart = document.getElementById("bananaStart");
    const menuMusic = document.getElementById("menuMusic");
    const roomMusic = document.getElementById("roomMusic");

    bananaStart.addEventListener("click", () => {
      startScreen.style.display = "none";
      gameScreen.style.display = "block";
      menuMusic.pause();
      roomMusic.play();
    });
  </script>
</body>
</html>
