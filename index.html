<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ms. BananaS</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      background-color: black;
      color: #FFD700;
      text-align: center;
      overflow: hidden;
    }

    #startScreen {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #bananaStart {
      width: 240px;
      cursor: pointer;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    #bananaStart:hover {
      transform: scale(1.1) rotate(-5deg);
      filter: drop-shadow(0 0 15px yellow);
    }

    .menu-text {
      font-size: 1.5em;
      margin-top: 20px;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.9em;
      color: #888;
    }

    #gameScreen {
      display: none;
      width: 100%;
      height: 100vh;
      background-image: url('Room.png');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    #bananaGame {
      position: absolute;
      left: 10%;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
    }

    #tv {
      position: absolute;
      left: 55%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      height: 270px;
      background-color: black;
      border: 4px solid #333;
      box-shadow: 0 0 20px #000;
    }

    #animal {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .options {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    .options button {
      font-size: 1.2em;
      padding: 10px 20px;
      background-color: #222;
      color: #FFD700;
      border: 2px solid #FFD700;
      cursor: pointer;
    }

    #dialogueBox {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      padding: 15px;
      background-color: rgba(0,0,0,0.7);
      color: #FFD700;
      font-size: 1.2em;
      border: 2px solid #FFD700;
      display: none;
    }

    #rageText {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5em;
      color: red;
    }

    #jumpscare {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:black;
      z-index:9999;
    }

    #jumpscare img {
      width:100%; height:100%;
      object-fit:cover;
    }
  </style>
</head>
<body>
  <div id="startScreen">
    <h1>Ms. BananaS</h1>
    <p class="menu-text">Haz clic en Ms. BananaS para comenzar</p>
    <img id="bananaStart" src="banana.png" alt="Ms. BananaS">
    <audio id="menuMusic" src="bananamenu.mp3" autoplay loop></audio>
    <footer>©Raphapro900 2026 — Este juego no tiene copyright</footer>
  </div>

  <div id="gameScreen">
    <audio id="roomMusic" src="Room Theme.mp3" loop></audio>
    <audio id="ayayaMusic" src="ayaya.mp3" loop></audio>
    <img id="bananaGame" src="banana.png" alt="Ms. BananaS">
    <div id="tv"><img id="animal" src="Seal.webp" alt="Animal"></div>
    <div class="options">
      <button>Seal</button>
      <button>Dog</button>
      <button>Cat</button>
      <button>Duck</button>
      <button>Eagle</button>
      <button>Snake</button>
    </div>
    <div id="dialogueBox">¡Bienvenido al primer día!</div>
    <audio id="dialogueAudio"></audio>
    <div id="rageText">Furia: 0</div>
  </div>

  <div id="jumpscare">
    <img src="jumpscare.png" alt="¡Jumpscare!">
  </div>

  <script>
    const bananaStart = document.getElementById("bananaStart");
    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const menuMusic = document.getElementById("menuMusic");
    const roomMusic = document.getElementById("roomMusic");
    const ayayaMusic = document.getElementById("ayayaMusic");
    const bananaGame = document.getElementById("bananaGame");
    const animalImg = document.getElementById("animal");
    const dialogueBox = document.getElementById("dialogueBox");
    const dialogueAudio = document.getElementById("dialogueAudio");
    const rageText = document.getElementById("rageText");
    const jumpscare = document.getElementById("jumpscare");
    const buttons = document.querySelectorAll(".options button");

    const animals = [
      {name:"Seal", file:"Seal.webp"},
      {name:"Dog", file:"Dog.jfif"},
      {name:"Cat", file:"Cat.jpj"},
      {name:"Duck", file:"Duck.avif"},
      {name:"Eagle", file:"Aguila.webp"},
      {name:"Snake", file:"Snake.jfif"}
    ];

    let currentAnimal = animals[0];
    let rage = 0;
    let specialMode = false;
    let specialFails = 0;
    let specialQuestions = 0;

    bananaStart.addEventListener("click", () => {
      startScreen.style.display = "none";
      gameScreen.style.display = "block";
      menuMusic.pause();
      roomMusic.play();
      dialogueBox.innerText = "¡Bienvenido al primer día!";
      dialogueAudio.src = "Primer dia.wav";
      dialogueBox.style.display = "block";
      dialogueAudio.play();
    });

    function nextAnimal() {
      currentAnimal = animals[Math.floor(Math.random()*animals.length)];
      animalImg.src = currentAnimal.file;
      animalImg.alt = currentAnimal.name;
      buttons.forEach(btn => btn.style.backgroundColor = "#222");
    }

    function activateSpecialMode() {
      specialMode = true;
      roomMusic.pause();
      ayayaMusic.play();
      bananaGame.src = "banana2.png";
      dialogueBox.innerText = "¡Ms. BananaS está furiosa!";
      dialogueBox.style.display = "block";
    }

    function triggerJumpscare() {
      jumpscare.style.display = "block";
      setTimeout(() => {
        window.location.href = "https://example.com";
      }, 2000);
    }

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        if (!specialMode) {
          if (btn.innerText === currentAnimal.name) {
            btn.style.backgroundColor = "green";
            dialogueAudio.src = ["c1.wav","c2.wav","c3.wav","c4.wav"][Math.floor(Math.random()*4)];
            dialogueBox.innerText = "¡Correcto!";
            dialogueBox.style.display = "block";
            dialogueAudio.play();
            setTimeout(nextAnimal, 2000);
          } else {
            btn.style.backgroundColor = "red";
            buttons.forEach(b => {
              if (b.innerText === currentAnimal.name) b.style.backgroundColor = "yellow";
            });
            rage++;
            rageText.innerText = "Furia: " + rage;
            dialogueAudio.src = ["f1.wav","f2.wav","f3.wav","f4.wav"][Math.floor(Math.random()*4)];
            dialogueBox.innerText = "¡Fallaste!";
            dialogueBox.style.display = "block";
            dialogueAudio.play();
            if (rage >= 10) activateSpecialMode();
            setTimeout(nextAnimal, 2000);
          }
        } else {
          specialQuestions++;
          if (btn.innerText === currentAnimal.name) {
            dialogueBox.innerText = "¡Mal!";
            dialogueBox.style.display = "block";
            dialogueAudio.src = ["c1.wav","c2.wav","c3.wav","c4.wav"][Math.floor(Math.random()*4)];
            dialogueAudio.play();
            setTimeout(nextAnimal, 2000);
          } else {
            // Fallo en modo especial
            btn.style.backgroundColor = "red";
            specialFails++;
            dialogueBox.innerText = "¡Fallaste!";
            dialogueBox.style.display = "block";
            dialogueAudio.src = ["f1.wav","f2.wav","f3.wav","f4.wav"][Math.floor(Math.random()*4)];
            dialogueAudio.play();
            if (specialFails >= 3) {
              triggerJumpscare();
            } else {
              setTimeout(nextAnimal, 2000);
            }
          }
        }
      });
    });
  </script>
</body>
</html>
